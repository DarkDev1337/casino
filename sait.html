<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 CASINO ROYALE</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Кастомные иконки (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ffd700;
            --primary-dark: #b8860b;
            --secondary: #ff6b6b;
            --success: #4ecdc4;
            --danger: #ff4757;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --light: #f1f1f1;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 107, 0.05) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
        }

        /* Кастомные иконки через Font Awesome */
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin-right: 10px;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .icon:hover {
            background: var(--glass-hover);
            transform: scale(1.1);
        }

        .icon-gold {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: var(--dark);
        }

        .icon-silver {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: var(--dark);
        }

        .icon-bronze {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: var(--light);
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .balance i {
            font-size: 32px;
            color: var(--primary);
            filter: drop-shadow(0 0 10px gold);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .username {
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--success));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            animation: fadeIn 0.5s ease 0.2s both;
        }

        .nav-btn {
            flex: 1;
            min-width: 100px;
            padding: 15px 10px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .nav-btn i {
            font-size: 28px;
            transition: all 0.3s ease;
        }

        .nav-btn span {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: transparent;
        }

        .nav-btn.active i {
            transform: scale(1.1);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            background: var(--glass-hover);
        }

        /* ===== КОНТЕНТ ===== */
        .content {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.5s ease 0.3s both;
        }

        /* ===== СЛОТЫ ===== */
        .slot-machine {
            background: linear-gradient(145deg, var(--darker), var(--dark));
            border-radius: 30px;
            padding: 30px;
            margin: 20px 0;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        inset 0 0 20px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .slot-machine::after {
            content: '🎰';
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 100px;
            opacity: 0.05;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .slot-symbols {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .symbol-card {
            text-align: center;
            padding: 15px 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .symbol-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .symbol-card:hover::before {
            opacity: 1;
        }

        .symbol-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .symbol-multiplier {
            font-size: 14px;
            color: var(--primary);
            font-weight: 700;
            display: block;
        }

        .symbol-chance {
            font-size: 11px;
            color: #888;
            display: block;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 20px;
            perspective: 1000px;
            margin: 30px 0;
        }

        .reel-container {
            background: linear-gradient(145deg, #0f0f1a, #1a1a2a);
            border-radius: 20px;
            padding: 10px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .reel {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                        inset 0 2px 5px rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .reel.spinning {
            animation: slotSpin 0.1s linear infinite;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        @keyframes slotSpin {
            0% { transform: scale(1); text-shadow: 0 0 5px gold; }
            50% { transform: scale(1.1); text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); text-shadow: 0 0 5px gold; }
        }

        /* ===== КОСТИ ===== */
        .dice-game {
            text-align: center;
        }

        .dice-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .dice-player, .dice-bot {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .dice-player h3 i, .dice-bot h3 i {
            margin-right: 10px;
            color: var(--primary);
        }

        .dice-box {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .die {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #fff, #f0f0f0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: var(--dark);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3),
                        inset 0 -5px 0 rgba(0, 0, 0, 0.1);
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .die::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), transparent);
            opacity: 0.5;
        }

        .die.rolling {
            animation: roll 0.5s ease;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice-sum {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px gold;
        }

        /* ===== РУЛЕТКА ===== */
        .roulette-game {
            text-align: center;
        }

        .roulette-wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 20px auto;
        }

        .roulette-wheel {
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                #ff4444 0deg 9.73deg,
                #000000 9.73deg 19.46deg,
                #ff4444 19.46deg 29.19deg,
                #000000 29.19deg 38.92deg,
                #00ff00 38.92deg 48.65deg,
                #ff4444 48.65deg 58.38deg,
                #000000 58.38deg 68.11deg,
                #ff4444 68.11deg 77.84deg,
                #000000 77.84deg 87.57deg,
                #ff4444 87.57deg 97.3deg,
                #000000 97.3deg 107.03deg,
                #ff4444 107.03deg 116.76deg,
                #000000 116.76deg 126.49deg,
                #ff4444 126.49deg 136.22deg,
                #000000 136.22deg 145.95deg,
                #ff4444 145.95deg 155.68deg,
                #000000 155.68deg 165.41deg,
                #ff4444 165.41deg 175.14deg,
                #000000 175.14deg 184.87deg,
                #ff4444 184.87deg 194.6deg,
                #000000 194.6deg 204.33deg,
                #ff4444 204.33deg 214.06deg,
                #000000 214.06deg 223.79deg,
                #ff4444 223.79deg 233.52deg,
                #000000 233.52deg 243.25deg,
                #ff4444 243.25deg 252.98deg,
                #000000 252.98deg 262.71deg,
                #ff4444 262.71deg 272.44deg,
                #000000 272.44deg 282.17deg,
                #ff4444 282.17deg 291.9deg,
                #000000 291.9deg 301.63deg,
                #ff4444 301.63deg 311.36deg,
                #000000 311.36deg 321.09deg,
                #ff4444 321.09deg 330.82deg,
                #000000 330.82deg 340.55deg,
                #ff4444 340.55deg 350.28deg,
                #00ff00 350.28deg 360deg
            );
            border-radius: 50%;
            border: 5px solid var(--primary);
            position: relative;
            transition: transform 3s cubic-bezier(0.3, 0.8, 0.2, 1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .roulette-wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px gold;
        }

        .roulette-marker {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: var(--primary);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            filter: drop-shadow(0 0 10px gold);
        }

        .roulette-numbers {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .number-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .number-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .number-btn:hover::before {
            left: 100%;
        }

        .number-btn.red { 
            background: #ff4444; 
            color: white;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.3);
        }
        .number-btn.black { 
            background: #000000; 
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .number-btn.green { 
            background: #00ff00; 
            color: black;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }

        .number-btn:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .number-btn.selected {
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px gold;
        }

        /* ===== СТАВКИ ===== */
        .bet-controls {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .bet-controls h3 i {
            margin-right: 10px;
            color: var(--primary);
        }

        .bet-amounts {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bet-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--dark);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .bet-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: left 0.5s ease;
        }

        .bet-btn:hover::before {
            left: 100%;
        }

        .bet-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5);
        }

        .bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .play-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, var(--secondary), var(--danger));
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
            position: relative;
            overflow: hidden;
        }

        .play-btn i {
            margin-right: 10px;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.6);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== РЕЗУЛЬТАТ ===== */
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 20px;
            text-align: center;
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .result i {
            font-size: 28px;
        }

        .result.win {
            background: rgba(78, 205, 196, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .result.loss {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            20% { transform: translateX(100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .reel {
                width: 80px;
                height: 80px;
                font-size: 48px;
            }

            .reels {
                gap: 10px;
            }

            .dice-box {
                gap: 10px;
            }

            .die {
                width: 70px;
                height: 70px;
                font-size: 36px;
            }

            .roulette-wheel-container {
                width: 280px;
                height: 280px;
            }

            .bet-btn {
                padding: 12px 20px;
                font-size: 14px;
            }

            .slot-symbols {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .nav-btn {
                min-width: 70px;
                padding: 10px 5px;
            }

            .nav-btn i {
                font-size: 20px;
            }

            .nav-btn span {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- ШАПКА -->
    <div class="header">
        <div class="balance">
            <i class="fas fa-coins"></i>
            <span id="balance">1000</span>
            <span class="icon icon-gold">
                <i class="fas fa-crown"></i>
            </span>
        </div>
        <div class="user-info">
            <span class="username" id="username">Загрузка...</span>
            <div class="avatar" id="avatar">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav">
        <button class="nav-btn active" onclick="showGame('slots')">
            <i class="fas fa-slot-machine"></i>
            <span>СЛОТЫ</span>
        </button>
        <button class="nav-btn" onclick="showGame('dice')">
            <i class="fas fa-dice"></i>
            <span>КОСТИ</span>
        </button>
        <button class="nav-btn" onclick="showGame('roulette')">
            <i class="fas fa-circle"></i>
            <span>РУЛЕТКА</span>
        </button>
        <button class="nav-btn" onclick="showGame('blackjack')">
            <i class="fas fa-spade"></i>
            <span>БЛЭКДЖЕК</span>
        </button>
    </div>

    <!-- КОНТЕНТ -->
    <div class="content">
        <!-- СЛОТЫ -->
        <div id="slots" class="game-section">
            <div class="slots-machine">
                <h2><i class="fas fa-slot-machine" style="margin-right: 10px; color: var(--primary);"></i>ИГРОВЫЕ АВТОМАТЫ</h2>
                
                <div class="slot-symbols">
                    <div class="symbol-card">
                        <span class="symbol-icon">🍒</span>
                        <span class="symbol-multiplier">x2</span>
                        <span class="symbol-chance">30%</span>
                    </div>
                    <div class="symbol-card">
                        <span class="symbol-icon">🍋</span>
                        <span class="symbol-multiplier">x3</span>
                        <span class="symbol-chance">25%</span>
                    </div>
                    <div class="symbol-card">
                        <span class="symbol-icon">🍊</span>
                        <span class="symbol-multiplier">x4</span>
                        <span class="symbol-chance">20%</span>
                    </div>
                    <div class="symbol-card">
                        <span class="symbol-icon">🍇</span>
                        <span class="symbol-multiplier">x5</span>
                        <span class="symbol-chance">15%</span>
                    </div>
                    <div class="symbol-card">
                        <span class="symbol-icon">💎</span>
                        <span class="symbol-multiplier">x10</span>
                        <span class="symbol-chance">7%</span>
                    </div>
                    <div class="symbol-card">
                        <span class="symbol-icon">7️⃣</span>
                        <span class="symbol-multiplier">x50</span>
                        <span class="symbol-chance">3%</span>
                    </div>
                </div>

                <div class="slot-machine">
                    <div class="reels">
                        <div class="reel-container">
                            <div class="reel" id="reel1">🍒</div>
                        </div>
                        <div class="reel-container">
                            <div class="reel" id="reel2">🍒</div>
                        </div>
                        <div class="reel-container">
                            <div class="reel" id="reel3">🍒</div>
                        </div>
                    </div>
                </div>

                <div class="bet-controls">
                    <h3><i class="fas fa-coins"></i>ВЫБЕРИ СТАВКУ:</h3>
                    <div class="bet-amounts">
                        <button class="bet-btn" onclick="selectBet(10)">10 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(50)">50 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(100)">100 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(500)">500 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(1000)">1000 <i class="fas fa-coins"></i></button>
                    </div>

                    <button class="play-btn" id="playSlotsBtn" onclick="playSlots()" disabled>
                        <i class="fas fa-play"></i> КРУТИТЬ
                    </button>
                </div>

                <div id="slotsResult" class="result"></div>
            </div>
        </div>

        <!-- КОСТИ -->
        <div id="dice" class="game-section" style="display: none;">
            <div class="dice-game">
                <h2><i class="fas fa-dice" style="margin-right: 10px; color: var(--primary);"></i>ИГРА В КОСТИ</h2>
                
                <div class="dice-container">
                    <div class="dice-player">
                        <h3><i class="fas fa-user"></i> ТЫ</h3>
                        <div class="dice-box">
                            <div class="die" id="playerDie1">⚀</div>
                            <div class="die" id="playerDie2">⚀</div>
                        </div>
                        <div class="dice-sum" id="playerSum">2</div>
                    </div>
                    
                    <div class="dice-bot">
                        <h3><i class="fas fa-robot"></i> БОТ</h3>
                        <div class="dice-box">
                            <div class="die" id="botDie1">⚀</div>
                            <div class="die" id="botDie2">⚀</div>
                        </div>
                        <div class="dice-sum" id="botSum">2</div>
                    </div>
                </div>

                <div class="bet-controls">
                    <h3><i class="fas fa-coins"></i>ВЫБЕРИ СТАВКУ:</h3>
                    <div class="bet-amounts">
                        <button class="bet-btn" onclick="selectBet(10)">10 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(50)">50 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(100)">100 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(500)">500 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectBet(1000)">1000 <i class="fas fa-coins"></i></button>
                    </div>

                    <button class="play-btn" id="playDiceBtn" onclick="playDice()" disabled>
                        <i class="fas fa-dice"></i> БРОСИТЬ
                    </button>
                </div>

                <div id="diceResult" class="result"></div>
            </div>
        </div>

        <!-- РУЛЕТКА -->
        <div id="roulette" class="game-section" style="display: none;">
            <div class="roulette-game">
                <h2><i class="fas fa-circle" style="margin-right: 10px; color: var(--primary);"></i>РУЛЕТКА</h2>
                
                <div class="roulette-wheel-container">
                    <div class="roulette-wheel" id="rouletteWheel"></div>
                    <div class="roulette-marker"></div>
                </div>

                <div class="bet-controls">
                    <h3><i class="fas fa-dice"></i>ТИП СТАВКИ:</h3>
                    <div class="bet-amounts">
                        <button class="bet-btn" onclick="setRouletteBet('number')">
                            <i class="fas fa-hashtag"></i> ЧИСЛО (x36)
                        </button>
                        <button class="bet-btn" onclick="setRouletteBet('red')">
                            <i class="fas fa-circle" style="color: #ff4444;"></i> КРАСНОЕ (x2)
                        </button>
                        <button class="bet-btn" onclick="setRouletteBet('black')">
                            <i class="fas fa-circle" style="color: #000;"></i> ЧЕРНОЕ (x2)
                        </button>
                        <button class="bet-btn" onclick="setRouletteBet('even')">
                            <i class="fas fa-check"></i> ЧЕТ (x2)
                        </button>
                        <button class="bet-btn" onclick="setRouletteBet('odd')">
                            <i class="fas fa-times"></i> НЕЧЕТ (x2)
                        </button>
                    </div>

                    <div id="rouletteNumbers" class="roulette-numbers"></div>

                    <h3><i class="fas fa-coins"></i>СУММА СТАВКИ:</h3>
                    <div class="bet-amounts">
                        <button class="bet-btn" onclick="selectRouletteAmount(10)">10 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectRouletteAmount(50)">50 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectRouletteAmount(100)">100 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectRouletteAmount(500)">500 <i class="fas fa-coins"></i></button>
                        <button class="bet-btn" onclick="selectRouletteAmount(1000)">1000 <i class="fas fa-coins"></i></button>
                    </div>

                    <button class="play-btn" id="playRouletteBtn" onclick="playRoulette()" disabled>
                        <i class="fas fa-play"></i> КРУТИТЬ
                    </button>
                </div>

                <div id="rouletteResult" class="result"></div>
            </div>
        </div>

        <!-- БЛЭКДЖЕК -->
        <div id="blackjack" class="game-section" style="display: none;">
            <div style="text-align: center; padding: 50px;">
                <h2><i class="fas fa-spade" style="margin-right: 10px; color: var(--primary);"></i>БЛЭКДЖЕК</h2>
                <div style="margin-top: 30px;">
                    <i class="fas fa-tools" style="font-size: 64px; color: var(--primary);"></i>
                </div>
                <p style="margin-top: 20px; font-size: 18px;">Скоро будет доступен!</p>
                <div style="margin-top: 20px;">
                    <i class="fas fa-cog fa-spin" style="font-size: 24px; margin: 0 10px;"></i>
                    <i class="fas fa-cog fa-spin" style="font-size: 24px; margin: 0 10px; animation-direction: reverse;"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Данные пользователя
        let user = tg.initDataUnsafe?.user;
        let currentBalance = 1000;
        let currentBet = 0;
        let currentGame = 'slots';
        
        // Для рулетки
        let rouletteBetType = null;
        let rouletteNumber = null;
        let rouletteAmount = 0;

        // Конфигурация слотов
        const slotSymbols = ['🍒', '🍋', '🍊', '🍇', '💎', '7️⃣'];
        const slotProbabilities = [30, 25, 20, 15, 7, 3];
        const slotMultipliers = {
            '🍒': 2,
            '🍋': 3,
            '🍊': 4,
            '🍇': 5,
            '💎': 10,
            '7️⃣': 50
        };

        // Состояние слотов
        let slotsState = {
            isSpinning: false,
            currentReel: 0,
            finalSymbols: []
        };

        // ===== ЗАГРУЗКА =====
        window.onload = function() {
            if (user) {
                document.getElementById('username').textContent = user.first_name || 'Игрок';
                document.getElementById('avatar').innerHTML = `<i class="fas fa-user"></i>`;
            }
            
            loadBalance();
            initRouletteNumbers();
            showGame('slots');
        };

        // ===== БАЛАНС =====
        function loadBalance() {
            updateBalance(1000);
        }

        function updateBalance(newBalance) {
            currentBalance = newBalance;
            document.getElementById('balance').textContent = currentBalance;
        }

        // ===== НАВИГАЦИЯ =====
        function showGame(game) {
            currentGame = game;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.querySelectorAll('.game-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(game).style.display = 'block';
            
            currentBet = 0;
            if (document.getElementById(`play${game.charAt(0).toUpperCase() + game.slice(1)}Btn`)) {
                document.getElementById(`play${game.charAt(0).toUpperCase() + game.slice(1)}Btn`).disabled = true;
            }
        }

        // ===== СТАВКИ =====
        function selectBet(amount) {
            if (amount > currentBalance) {
                showResult(currentGame, '❌ Недостаточно средств!', false);
                return;
            }
            
            currentBet = amount;
            document.getElementById(`play${currentGame.charAt(0).toUpperCase() + currentGame.slice(1)}Btn`).disabled = false;
        }

        // ===== СЛОТЫ =====
        function getRandomSymbol() {
            const rand = Math.random() * 100;
            let cumulative = 0;
            
            for (let i = 0; i < slotSymbols.length; i++) {
                cumulative += slotProbabilities[i];
                if (rand <= cumulative) {
                    return slotSymbols[i];
                }
            }
            return slotSymbols[0];
        }

        function playSlots() {
            if (currentBet === 0 || currentBet > currentBalance) {
                showResult('slots', '❌ Сделай ставку!', false);
                return;
            }
            
            if (slotsState.isSpinning) return;
            
            updateBalance(currentBalance - currentBet);
            
            slotsState.finalSymbols = [];
            for (let i = 0; i < 3; i++) {
                slotsState.finalSymbols.push(getRandomSymbol());
            }
            
            startSlotSpin();
        }

        function startSlotSpin() {
            slotsState.isSpinning = true;
            slotsState.currentReel = 0;
            
            document.getElementById('playSlotsBtn').disabled = true;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.disabled = true;
            });
            
            document.getElementById('slotsResult').textContent = '';
            document.getElementById('slotsResult').className = 'result';
            
            spinReel(1);
        }

        function spinReel(reelNumber) {
            const reelElement = document.getElementById(`reel${reelNumber}`);
            let iterations = 0;
            const maxIterations = 20 + (reelNumber * 5);
            
            reelElement.classList.add('spinning');
            
            const interval = setInterval(() => {
                reelElement.textContent = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                iterations++;
                
                if (iterations >= maxIterations) {
                    clearInterval(interval);
                    reelElement.classList.remove('spinning');
                    reelElement.textContent = slotsState.finalSymbols[reelNumber - 1];
                    
                    if (reelNumber === 3) {
                        setTimeout(() => {
                            checkSlotResult();
                        }, 500);
                    } else {
                        setTimeout(() => {
                            spinReel(reelNumber + 1);
                        }, 300);
                    }
                }
            }, 50);
        }

        function checkSlotResult() {
            const reel1 = document.getElementById('reel1').textContent;
            const reel2 = document.getElementById('reel2').textContent;
            const reel3 = document.getElementById('reel3').textContent;
            
            let win = 0;
            let resultText = '';
            let isWin = false;
            
            if (reel1 === reel2 && reel2 === reel3) {
                win = currentBet * slotMultipliers[reel1];
                resultText = `🎰 ДЖЕКПОТ! x${slotMultipliers[reel1]}`;
                isWin = true;
            } else if (reel1 === reel2 || reel2 === reel3 || reel1 === reel3) {
                win = currentBet * 2;
                resultText = '🎰 ДВОЙНОЕ СОВПАДЕНИЕ! x2';
                isWin = true;
            } else {
                win = 0;
                resultText = '❌ НЕТ СОВПАДЕНИЙ';
                isWin = false;
            }
            
            if (win > 0) {
                updateBalance(currentBalance + win);
            }
            
            showSlotResult(resultText, isWin, win);
            
            setTimeout(() => {
                slotsState.isSpinning = false;
                document.getElementById('playSlotsBtn').disabled = currentBet === 0;
                document.querySelectorAll('.bet-btn').forEach(btn => {
                    btn.disabled = false;
                });
            }, 1000);
        }

        function showSlotResult(text, isWin, winAmount) {
            const resultDiv = document.getElementById('slotsResult');
            
            let icon = isWin ? '<i class="fas fa-trophy"></i>' : '<i class="fas fa-times-circle"></i>';
            let fullText = icon + ' ' + text;
            
            if (winAmount > 0) {
                fullText += `<br><i class="fas fa-coins"></i> ВЫИГРЫШ: +${winAmount}`;
            } else if (winAmount === 0 && currentBet > 0) {
                fullText += `<br><i class="fas fa-coins"></i> ПРОИГРЫШ: -${currentBet}`;
            }
            
            resultDiv.innerHTML = fullText;
            resultDiv.className = 'result ' + (isWin ? 'win' : 'loss');
        }

        // ===== КОСТИ =====
        function playDice() {
            if (currentBet === 0 || currentBet > currentBalance) {
                showResult('dice', '❌ Сделай ставку!', false);
                return;
            }
            
            updateBalance(currentBalance - currentBet);
            
            const playerDice = ['playerDie1', 'playerDie2'];
            const botDice = ['botDie1', 'botDie2'];
            
            playerDice.forEach(id => animateDie(id));
            botDice.forEach(id => animateDie(id));
            
            setTimeout(() => {
                const p1 = Math.floor(Math.random() * 6) + 1;
                const p2 = Math.floor(Math.random() * 6) + 1;
                const playerSum = p1 + p2;
                
                const b1 = Math.floor(Math.random() * 6) + 1;
                const b2 = Math.floor(Math.random() * 6) + 1;
                const botSum = b1 + b2;
                
                document.getElementById('playerDie1').textContent = getDieFace(p1);
                document.getElementById('playerDie2').textContent = getDieFace(p2);
                document.getElementById('botDie1').textContent = getDieFace(b1);
                document.getElementById('botDie2').textContent = getDieFace(b2);
                document.getElementById('playerSum').textContent = playerSum;
                document.getElementById('botSum').textContent = botSum;
                
                let win = 0;
                let resultText = '';
                let isWin = false;
                
                if (playerSum > botSum) {
                    win = currentBet * 2;
                    resultText = '✅ ТЫ ПОБЕДИЛ!';
                    isWin = true;
                } else if (playerSum < botSum) {
                    win = 0;
                    resultText = '❌ БОТ ПОБЕДИЛ!';
                    isWin = false;
                } else {
                    win = currentBet;
                    resultText = '🤝 НИЧЬЯ!';
                    isWin = true;
                }
                
                if (win > 0 && win !== currentBet) {
                    updateBalance(currentBalance + win);
                } else if (win === currentBet) {
                    updateBalance(currentBalance + currentBet);
                }
                
                showDiceResult(resultText, isWin, win);
                
                currentBet = 0;
                document.getElementById('playDiceBtn').disabled = true;
            }, 1000);
        }

        function animateDie(id) {
            const die = document.getElementById(id);
            die.classList.add('rolling');
            
            setTimeout(() => {
                die.classList.remove('rolling');
            }, 500);
        }

        function getDieFace(value) {
            const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            return faces[value - 1];
        }

        function showDiceResult(text, isWin, winAmount) {
            const resultDiv = document.getElementById('diceResult');
            
            let icon = isWin ? '<i class="fas fa-trophy"></i>' : '<i class="fas fa-times-circle"></i>';
            let fullText = icon + ' ' + text;
            
            if (winAmount > 0 && winAmount !== currentBet) {
                fullText += `<br><i class="fas fa-coins"></i> ВЫИГРЫШ: +${winAmount}`;
            } else if (winAmount === 0) {
                fullText += `<br><i class="fas fa-coins"></i> ПРОИГРЫШ: -${currentBet}`;
            } else if (winAmount === currentBet) {
                fullText += `<br><i class="fas fa-coins"></i> ВОЗВРАТ СТАВКИ: +${currentBet}`;
            }
            
            resultDiv.innerHTML = fullText;
            resultDiv.className = 'result ' + (isWin ? 'win' : 'loss');
        }

        // ===== РУЛЕТКА =====
        function initRouletteNumbers() {
            const container = document.getElementById('rouletteNumbers');
            const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
            
            for (let i = 0; i <= 36; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.innerHTML = i;
                
                if (i === 0) {
                    btn.classList.add('green');
                } else if (redNumbers.includes(i)) {
                    btn.classList.add('red');
                } else {
                    btn.classList.add('black');
                }
                
                btn.onclick = () => selectRouletteNumber(i);
                container.appendChild(btn);
            }
        }

        function setRouletteBet(type) {
            rouletteBetType = type;
            document.getElementById('playRouletteBtn').disabled = rouletteAmount === 0;
        }

        function selectRouletteNumber(num) {
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            rouletteNumber = num;
            setRouletteBet('number');
        }

        function selectRouletteAmount(amount) {
            if (amount > currentBalance) {
                showResult('roulette', '❌ Недостаточно средств!', false);
                return;
            }
            rouletteAmount = amount;
            document.getElementById('playRouletteBtn').disabled = !rouletteBetType;
        }

        function playRoulette() {
            if (!rouletteBetType || rouletteAmount === 0 || rouletteAmount > currentBalance) return;
            
            updateBalance(currentBalance - rouletteAmount);
            
            const wheel = document.getElementById('rouletteWheel');
            const spinDegrees = 1440 + Math.floor(Math.random() * 360);
            wheel.style.transform = `rotate(${spinDegrees}deg)`;
            
            setTimeout(() => {
                const result = Math.floor(Math.random() * 37);
                const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
                
                let win = 0;
                let resultText = `Выпало число ${result}`;
                let isWin = false;
                
                if (rouletteBetType === 'number' && rouletteNumber === result) {
                    win = rouletteAmount * 36;
                    isWin = true;
                } else if (rouletteBetType === 'red' && redNumbers.includes(result)) {
                    win = rouletteAmount * 2;
                    isWin = true;
                } else if (rouletteBetType === 'black' && !redNumbers.includes(result) && result !== 0) {
                    win = rouletteAmount * 2;
                    isWin = true;
                } else if (rouletteBetType === 'even' && result !== 0 && result % 2 === 0) {
                    win = rouletteAmount * 2;
                    isWin = true;
                } else if (rouletteBetType === 'odd' && result % 2 === 1) {
                    win = rouletteAmount * 2;
                    isWin = true;
                } else {
                    win = 0;
                    isWin = false;
                }
                
                if (win > 0) {
                    updateBalance(currentBalance + win);
                }
                
                showRouletteResult(resultText, isWin, win);
                
                rouletteBetType = null;
                rouletteAmount = 0;
                rouletteNumber = null;
                document.getElementById('playRouletteBtn').disabled = true;
                
                document.querySelectorAll('.number-btn').forEach(btn => {
                    btn.classList.remove('selected');
                });
            }, 3000);
        }

        function showRouletteResult(text, isWin, winAmount) {
            const resultDiv = document.getElementById('rouletteResult');
            
            let icon = isWin ? '<i class="fas fa-trophy"></i>' : '<i class="fas fa-times-circle"></i>';
            let fullText = icon + ' ' + text;
            
            if (winAmount > 0) {
                fullText += `<br><i class="fas fa-coins"></i> ВЫИГРЫШ: +${winAmount}`;
            } else {
                fullText += `<br><i class="fas fa-coins"></i> ПРОИГРЫШ: -${rouletteAmount}`;
            }
            
            resultDiv.innerHTML = fullText;
            resultDiv.className = 'result ' + (isWin ? 'win' : 'loss');
        }

        // ===== ОБЩИЙ РЕЗУЛЬТАТ =====
        function showResult(game, message, isWin) {
            const resultDiv = document.getElementById(game + 'Result');
            const icon = isWin ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            resultDiv.innerHTML = icon + ' ' + message;
            resultDiv.className = 'result ' + (isWin ? 'win' : 'loss');
            
            setTimeout(() => {
                resultDiv.innerHTML = '';
                resultDiv.className = 'result';
            }, 3000);
        }
    </script>
</body>
</html>
